name: "nvim"

on: ["push"]

env:
  NVIM_BASE_DIR: "vim/.config/nvim"

jobs:
  stylua:
    runs-on: docker
    steps:
      - uses: actions/checkout@v6
      - uses: JohnnyMorganz/stylua-action@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          version: v0.20.0
          args: >-
            --allow-hidden
            --check
            -f ${{ env.NVIM_BASE_DIR }}/stylua.toml
            ${{ env.NVIM_BASE_DIR }}
