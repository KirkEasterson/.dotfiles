name: "qtile"

on: ["push"]

jobs:
  check:
    runs-on: docker
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          cache: "pip"
      - name: "Install pip"
        run: python -m pip install --upgrade pip
      - name: "Install qtile"
        run: pip install qtile
      - name: "Validate"
        run: qtile check --config ./window-managers/.config/qtile/config.py
