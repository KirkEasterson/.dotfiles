name: "zsh"
on: ["push"]

jobs:
  config-check:
    runs-on: docker
    container:
      image: debian:12-slim
    steps:
      - name: "Install node"
        run: apt update && apt install -y lsb-release nodejs
      - uses: "actions/checkout@v6"
      - run: "apt install -y stow"
      - run: "stow shell"

      - run: "apt install -y zsh"
      - name: "Check zsh"
        run: "ZDOTDIR=~/.config/zsh zsh --version"
