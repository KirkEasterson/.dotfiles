prSections:
  - title: Created
    filters: is:open author:@me
  - title: Mentioned
    filters: is:open mentions:@me
  - title: Needs review
    filters: is:open review-requested:@me

issuesSections:
  - title: Created
    filters: is:open author:@me
  - title: Assigned
    filters: is:open assignee:@me
  - title: Involved
    filters: is:open -author:@me

defaults:
  preview:
    open: true
    width: 50
  prsLimit: 20
  issuesLimit: 20
  view: prs
  layout:
    prs:
      updatedAt:
        width: 7
      repo:
        width: 15
      author:
        width: 15
      assignees:
        width: 20
        hidden: true
      base:
        width: 15
        hidden: true
      lines:
        width: 16
    issues:
      updatedAt:
        width: 7
      repo:
        width: 15
      creator:
        width: 10
      assignees:
        width: 20
        hidden: true
  refetchIntervalMinutes: 30

repoPaths:
  :owner/:repo: ~/dev/github.com/:owner/:repo

  # TODO: add bindings for using git-worktree
keybindings:
  issues: []
  prs:
    - key: i
      command: |
        tmux new-window -c {{.RepoPath}}
        'gh pr checkout {{.PrNumber}} &&
          nvim -c ":DiffviewOpen main...{{.HeadRefName}}"'

theme:
  ui:
    table:
      showSeparator: true
