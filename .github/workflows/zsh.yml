name: "zsh"
on: ["push"]

jobs:
  config-check:
    runs-on: "ubuntu-latest"
    permissions:
      contents: read
    steps:
      - uses: "actions/checkout@v6"
      - run: "sudo apt install -y stow"
      - run: "stow shell"

      - run: "sudo apt install -y zsh"
      - name: "Check zsh"
        run: "ZDOTDIR=~/.config/zsh zsh --version"
