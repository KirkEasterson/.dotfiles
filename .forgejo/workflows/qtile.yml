name: "qtile"

on: ["push"]

jobs:
  config-check:
    runs-on: docker
    container:
      image: ubuntu:24.04 # necessary for setup-python
    steps:
      - name: "Install workflow dependencies"
        run: apt update && apt install -y lsb-release nodejs libxcb1 libcairo2 libpango-1.0-0 libgdk-pixbuf-2.0-0
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.14.3"
      - name: "Install qtile"
        run: pip install qtile==0.35.0
      - name: "Validate"
        run: qtile check --config ./window-managers/.config/qtile/config.py
