name: "nvim"

on: ["push"]

env:
  NVIM_BASE_DIR: "vim/.config/nvim"

jobs:
  stylua:
    runs-on: docker
    container:
      image: debian:12-slim
    steps:
      - name: "Install workflow dependencies"
        run: apt update && apt install -y lsb-release nodejs cargo
      - uses: actions/checkout@v6

      # - name: "Install stylua"
      #   run: cargo install stylua

      - name: "Run stylua"
        run: stylua --allow-hidden --check -f ${{ env.NVIM_BASE_DIR }}/stylua.toml ${{ env.NVIM_BASE_DIR }}
