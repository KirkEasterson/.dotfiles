name: "qtile"

on: ["push"]

jobs:
  check:
    runs-on: docker
    container:
      image: ubuntu:24.04
    steps:
      - name: "Install node"
        run: apt update && apt install -y lsb-release nodejs
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.14.3"
      - name: "Install qtile"
        run: pip install xcffib==1.12.0 qtile==0.35.0
      - name: "Validate"
        run: qtile check --config ./window-managers/.config/qtile/config.py
